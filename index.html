<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Universe Manifesto // Multi-Node Cone v0.6.2</title>
    <style>
        /* Общие стили: увеличенный sans-serif, темная тема */
        body {
            background-color: #0d0f12; color: #d1d5db;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px; margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .hud-container {
            max-width: 750px; width: 100%; background: rgba(20, 24, 33, 0.9);
            border: 1px solid #1f2937; border-top: 4px solid #10b981;
            padding: 35px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        h1 { font-size: 32px; color: #ffffff; margin-top: 0; }
        .meta-info { background: #111827; padding: 15px; border-left: 3px solid #4b5563; margin-bottom: 25px; }
        /* Крупные кнопки */
        .manifesto-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .btn-manifesto {
            display: flex; align-items: center; justify-content: center;
            padding: 22px 15px; font-size: 22px; font-weight: 700;
            text-decoration: none; border-radius: 6px; transition: all 0.2s; text-align: center;
        }
        .btn-manifesto.ru { background-color: #1e3a8a; color: #ffffff; }
        .btn-manifesto.en { background-color: #065f46; color: #ffffff; }
        .btn-manifesto:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .epoch-list { list-style: none; padding: 0; }
        .epoch-item { margin: 10px 0; padding-left: 15px; border-left: 3px solid #374151; }
    </style>
</head>
<body>
<div class="hud-container">
    <h1>Nautilus Multiverse HUD</h1>
    <div class="meta-info">
        <div><strong>Контур:</strong> <span id="ws-status">ws://localhost:8765</span></div>
        <div><strong>Энтропия (H):</strong> <span id="entropy-val">1.0000</span></div>
    </div>
    <div class="manifesto-actions">
        <a href="README_ru.md" class="btn-manifesto ru">RU // Читать Манифест ↗</a>
        <a href="README_en.md" class="btn-manifesto en">EN // Open Declaration ↗</a>
    </div>
    <h3>ЭПОХИ:</h3>
    <ul class="epoch-list">
        <li class="epoch-item" style="border-color: #10b981;">Зеленая: Эра ИИ</li>
        <li class="epoch-item" style="border-color: #3b82f6;">Синяя: Перенос Разума</li>
    </ul>
</div>
<script>
    const EntropyEngine = {
        currentValue: 1.0000,
        init() {
            this.domElement = document.getElementById('entropy-val');
            setInterval(() => {
                this.currentValue -= (Math.random() * 0.001);
                if (this.domElement) this.domElement.innerText = this.currentValue.toFixed(4);
            }, 500);
        }
    };
    document.addEventListener('DOMContentLoaded', () => EntropyEngine.init());
</script>
<script>
    function initNetworkCone() {
        const statusLabel = document.getElementById('ws-status');
        setTimeout(() => {
            if (statusLabel) statusLabel.innerText = "ws://localhost:8765 [SIGNAL]";
        }, 1000);
    }
    initNetworkCone();
</script>
</body>
</html>
