<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Universe Manifesto // Multi-Node Cone v0.6.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            color: #56d364;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #56d364;
            padding: 15px;
            border-radius: 4px;
            width: 320px;
            box-shadow: 0 0 15px rgba(86, 211, 100, 0.2);
            pointer-events: none;
        }
        h1 {
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            border-bottom: 1px dashed #56d364;
            padding-bottom: 4px;
        }
        .hud-line {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .hud-val {
            color: #ffffff;
            font-weight: bold;
        }
        #manifesto-brand {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            line-height: 1.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- HUD Панель многоузловой телеметрии Фазы V -->
    <div id="hud-panel">
        <h1>Nautilus Multiverse HUD</h1>
        <div class="hud-line"><span>Контур связи:</span><span class="hud-val" style="color: #00f3ff;">ws://localhost:8765</span></div>
        <div class="hud-line"><span>Эра Космоса:</span><span class="hud-val" id="hud-epoch">Green (AI)</span></div>
        <div class="hud-line"><span>Энтропия (H):</span><span class="hud-val" id="hud-entropy">1.0000</span></div>
        <div class="hud-line"><span>Побитовое сито:</span><span class="hud-val" id="hud-sieve" style="text-align: right;">DIM: Ожидание...</span></div>
    </div>

    <div id="manifesto-brand">
        PROJECT: DIGITAL UNIVERSE MANIFESTO<br>
        PHASE V: MULTIVERSE INVARIANTS<br>
        BUILD: v0.6.0-beta // USER: mrdarkduck
    </div>

    <canvas id="nautilusCanvas"></canvas>

    <script>
        // Глобальный конфигуратор симуляции конуса
        const config = {
            gravity: 9.8,
            distance: 1.2,
            noiseLevel: 1.0,
            vortexSpeed: 1.0,
            focalLength: 300
        };

        const canvas = document.getElementById("nautilusCanvas");
        const ctx = canvas.getContext("2d");

        let cx = window.innerWidth / 2;
        let cy = window.innerHeight / 2;
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2;
            cy = canvas.height / 2;
        }
        window.addEventListener("resize", resize);
        resize();

        // Класс 3D-частицы из оригинальной стабильной версии v0.4.2-beta
        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius3d = Math.random() * 120 + 40;
                this.z3d = Math.random() * 100 + 100;
                this.speed = Math.random() * 0.01 + 0.005;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.color = this.type === 'noise' ? '#ff3333' : '#56d364';
            }

            update() {
                // Плавное экспоненциальное затягивание к центру
                let distanceFactor = Math.max(5, this.z3d);
                let pullForce = (config.gravity * 0.04) / (config.distance * (distanceFactor / 100));
                
                let currentSpeed = this.speed * (350 / (distanceFactor + 30));
                this.angle += currentSpeed * config.vortexSpeed;

                if (this.type === 'noise') {
                    this.radius3d -= pullForce * 0.15;
                    this.z3d -= pullForce * 0.2;
                    this.radius3d += (Math.random() - 0.5) * 1.5;
                    
                    // На границе барьера Наутилус очищает шум в полезный сигнал
                    if (this.z3d < 115 * config.distance) {
                        this.type = 'signal';
                        this.color = '#56d364';
                        this.speed = 0.006;
                    }
                } else {
                    // ПОШАГОВОЕ СХЛОПЫВАНИЕ СКВОЗЬ ВСЕ ЭПОХИ К ТОЧКЕ АТТРАКТОРА
                    this.radius3d -= pullForce * 0.42;
                    this.z3d -= pullForce * 0.55;

                    if (this.z3d >= 95) {
                        this.type = 'signal';
                        this.color = '#56d364'; // Зеленый: Эра ИИ
                    } 
                    else if (this.z3d < 95 && this.z3d >= 70) {
                        this.type = 'cyber';
                        this.color = '#00f3ff'; // Голубой: Киберимпланты
                    } 
                    else if (this.z3d < 70 && this.z3d >= 45) {
                        this.type = 'mind';
                        this.color = '#388bfd'; // Синий: Перенос разума
                    } 
                    else if (this.z3d < 45 && this.z3d >= 25) {
                        this.type = 'cloud';
                        this.color = '#ab47bc'; // Фиолетовый: Облако Сознания
                    } 
                    else if (this.z3d < 25 && this.z3d >= 8) {
                        // Эра 5: Зона Непостижимых Туманностей
                        this.type = 'nebula';
                        this.color = '#ffffff'; // Белое мерцающее облако
                        this.alpha = 0.3 + Math.sin(Date.now() * 0.02 + this.angle) * 0.2;
                        this.radius3d += (Math.random() - 0.5) * 1.0;
                    }
                    else if (this.z3d < 8) {
                        // Абсолютный финал: Схлопывание в острие конуса (Аттрактор)
                        this.type = 'seed';
                        this.color = '#d29922'; // Золотой
                        this.alpha = 1;
                        
                        // Жесткое удержание Огненного Семени на острие оси Z
                        this.z3d = 1 + Math.sin(Date.now() * 0.08) * 0.4;
                        this.radius3d = 2 + Math.cos(Date.now() * 0.08) * 0.4;

                        if (Math.random() * 100 > 99.2) {
                            this.reset();
                        }
                    }

                    if (this.z3d < -10) this.reset();
                }

                // Матрица честного 3D-поворота камеры (изометрия конуса)
                let cosY = Math.cos(Math.PI / 2.8);
                let sinY = Math.sin(Math.PI / 2.8);

                let x3d = Math.cos(this.angle) * this.radius3d;
                let y3d = Math.sin(this.angle) * this.radius3d;

                let rotatedY = y3d * cosY - this.z3d * sinY;
                this.rotatedZ = y3d * sinY + this.z3d * cosY;

                let scale = config.focalLength / (config.focalLength + this.rotatedZ);
                
                this.screenX = cx + x3d * scale;
                this.screenY = cy + (rotatedY + 60) * scale; 

                let baseSize = this.type === 'seed' ? 3.5 : (this.type === 'nebula' ? 3.5 : (this.type === 'cloud' ? 2.3 : 1.6));
                this.projectedSize = baseSize * scale;
            }

            draw() {
                if (this.projectedSize <= 0 || this.screenY > canvas.height || this.screenX > canvas.width) return;

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, this.projectedSize, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                let scale = config.focalLength / (config.focalLength + this.rotatedZ);
                ctx.shadowBlur = this.type === 'seed' ? 14 * scale : (this.type === 'nebula' ? 8 * scale : 1 * scale);
                ctx.shadowColor = this.color;
                
                ctx.fill();
                ctx.restore();
            }
        }
        function initParticles() {
            particles = [];
            let totalNoise = Math.floor(400 * config.noiseLevel);
            for (let i = 0; i < totalNoise; i++) particles.push(new Particle('noise'));
            for (let i = 0; i < 180; i++) particles.push(new Particle('signal'));
        }

        function animate() {
            // Мягкий шлейф неоновых филаментов
            ctx.fillStyle = 'rgba(0, 0, 0, 0.22)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => p.update());
            
            // Z-sorting: Математически глубокий рендеринг конуса
            particles.sort((a, b) => b.rotatedZ - a.rotatedZ);

            particles.forEach(p => p.draw());

            requestAnimationFrame(animate);
        }

        window.onload = function() {
            initParticles();
            animate();
        };
        // ============================================================================
        // REAL-TIME MIDDLEWARE LINK: MULTIVERSE CONNECTOR (PHASE V)
        // ============================================================================
        const socket = new WebSocket("ws://localhost:8765");

        socket.onopen = function(e) {
            console.log("[Nautilus UI] Сетевой мост Фазы V успешно развернут.");
            
            // Стриминг параметров на сервер для синхронизации нод каждые 100мс
            setInterval(() => {
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        id: "mrdarkduck_web_mesh",
                        gravity: config.gravity,
                        distance: config.distance
                    }));
                }
            }, 100);
        };

        socket.onmessage = function(event) {
            const report = JSON.parse(event.data);
            
            const epochEl = document.getElementById("hud-epoch");
            const entropyEl = document.getElementById("hud-entropy");
            const sieveEl = document.getElementById("hud-sieve");

            if (epochEl) epochEl.innerText = report.meta.type;
            if (entropyEl) entropyEl.innerText = report.physics.shannon_entropy.toFixed(4);
            
            if (sieveEl) {
                const sieve = report.crypto_sieve_v5;
                const dim = report.meta.multiverse_dimension;
                const ratio = report.network.global_convergence_ratio;
                
                if (sieve.sieve_cracked) {
                    sieveEl.innerHTML = `<span style="color: #d29922; font-weight:bold;">DIM: ${dim} [LOCKED]</span><br>` +
                                        `SEED: ${sieve.extracted_multiverse_seed.join("-")} (NET: ${ratio})`;
                } else {
                    sieveEl.innerHTML = `<span style="color: #00f3ff;">DIM: ${dim} [SIEVE]</span><br>` +
                                        `INTENSITY: ${sieve.intensity_steps} (NET: ${ratio})`;
                }
            }
        };

        socket.onerror = function(err) {
            console.error("[Nautilus UI] Сбой шлюза Мультивселенной.");
        };
    </script>
</body>
</html>
