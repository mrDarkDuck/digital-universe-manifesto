<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Digital Universe Manifesto // Multi‑Node Cone v0.6.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#010103;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#56d364}
canvas{display:block;width:100vw;height:100vh;position:absolute;top:0;left:0;z-index:1}
/* Телеметрия (HUD) */
#hud-panel{position:absolute;top:20px;left:20px;z-index:10;background:rgba(0,0,0,.85);border:1px solid #56d364;padding:15px;border-radius:4px;width:340px;box-shadow:0 0 15px rgba(86,211,100,.15);pointer-events:none}
h1{font-size:13px;text-transform:uppercase;margin-bottom:10px;letter-spacing:1px;border-bottom:1px dashed #56d364;padding-bottom:4px}
.hud-line{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.hud-val{color:#fff;font-weight:bold}
/* Визуальная легенда вихря */
#vortex-legend{position:absolute;top:20px;right:20px;z-index:10;background:rgba(0,0,0,.85);border:1px solid #56d364;padding:15px;border-radius:4px;width:260px;box-shadow:0 0 15px rgba(86,211,100,.15);pointer-events:none}
.legend-title{font-size:11px;font-weight:bold;margin-bottom:8px;border-bottom:1px dashed rgba(86,211,100,.4);padding-bottom:4px}
.legend-item{display:flex;align-items:center;font-size:11px;margin-bottom:4px;color:#fff}
.legend-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;display:inline-block}
/* Документационный блок */
#manifesto-panel{position:absolute;bottom:20px;left:20px;z-index:10;background:rgba(0,0,0,.9);border:1px solid #56d364;padding:24px;border-radius:6px;width:640px;box-shadow:0 0 20px rgba(86,211,100,.2)}
.panel-title{font-size:14px;font-weight:600;color:rgba(86,211,100,.8);margin-bottom:16px;letter-spacing:1.5px}
.links-container{display:flex;gap:20px}
/* Кнопки‑ссылки */
.readme-btn{display:flex;align-items:center;justify-content:center;width:100%;min-height:90px;font-size:22px;font-weight:700;letter-spacing:.5px;color:#fff;text-decoration:none;padding:24px 30px;border:2px solid #56d364;border-radius:6px;background:rgba(86,211,100,.08);transition:all .2s ease}
.readme-btn:hover{color:#000;background:#56d364;box-shadow:0 0 12px rgba(86,211,100,.4)}
#manifesto-brand{position:absolute;bottom:20px;right:20px;z-index:10;font-size:10px;color:rgba(255,255,255,.25);text-align:right;line-height:1.4;pointer-events:none}
</style>
</head>
<body>

<div id="hud-panel">
  <h1 data-i18n="panelTitle">Nautilus Multiverse HUD</h1>
  <div class="hud-line"><span>Контур связи:</span><span class="hud-val" id="hud-gate" data-i18n="hudGate"></span></div>
  <div class="hud-line"><span>Эра Космоса:</span><span class="hud-val" id="hud-epoch" data-i18n="hudEpoch"></span></div>
  <div class="hud-line"><span>Энтропия (H):</span><span class="hud-val" id="hud-entropy" data-i18n="hudEntropy"></span></div>
  <div class="hud-line"><span>Побитовое сито:</span><span class="hud-val" id="hud-sieve" style="text-align:right;" data-i18n="hudSieve"></span></div>
</div>

<div id="vortex-legend">
  <div class="legend-title" data-i18n="legendTitle">ЭПОХИ КОНВЕРГЕНЦИИ:</div>
  <!-- легенда будет генерироваться динамически -->
</div>

<div id="manifesto-panel">
  <div class="panel-title" data-i18n="panelTitle">ДОКУМЕНТАЦИЯ МУЛЬТИВСЕЛЕННОЙ:</div>
  <div class="links-container">
    <a href="README_ru.html" target="_blank" class="readme-btn" data-i18n="readmeRu"></a>
    <a href="README_en.html" target="_blank" class="readme-btn" data-i18n="readmeEn"></a>
  </div>
</div>

<div id="manifesto-brand"><span data-i18n="brandText"></span></div>

<canvas id="nautilusCanvas"></canvas>

<script>
/* ---------- i18n data ---------- */
const langData = {
  en: {
    hudGate:"ws://localhost:8765",
    hudEpoch:"Green (AI)",
    hudEntropy:"1.0000",
    hudSieve:"DIM: T_3 [LOCAL]",
    legendTitle:"CONVERGENCE ERAS:",
    legendItems:[
      {color:"#ff3333",label:"Red: Peripheral Noise"},
      {color:"#56d364",label:"Green: AI Era (Signal)"},
      {color:"#00f3ff",label:"Cyan: Cyberimplants"},
      {color:"#388bfd",label:"Blue: Mind Transfer"},
      {color:"#ab47bc",label:"Purple: Consciousness Cloud"},
      {color:"#ffffff",label:"White: Unknowable Zone"},
      {color:"#d29922",label:"Gold: Fiery Seed"}
    ],
    panelTitle:"MULTIVERSE DOCUMENTATION:",
    readmeRu:"RU // Читать Манифест ↗",
    readmeEn:"EN // Open Declaration ↗",
    brandText:`PROJECT: DIGITAL UNIVERSE MANIFESTO<br>PHASE V: MULTIVERSE INVARIANTS<br>BUILD: v0.6.2-beta`
  },
  ru:{
    hudGate:"ws://localhost:8765",
    hudEpoch:"Green (AI)",
    hudEntropy:"1.0000",
    hudSieve:"DIM: T_3 [LOCAL]",
    legendTitle:"ЭПОХИ КОНВЕРГЕНЦИИ:",
    legendItems:[
      {color:"#ff3333",label:"Красная: Периферийный Шум"},
      {color:"#56d364",label:"Зеленая: Эра ИИ (Сигнал)"},
      {color:"#00f3ff",label:"Голубая: Киберимпланты"},
      {color:"#388bfd",label:"Синяя: Перенос Разума"},
      {color:"#ab47bc",label:"Фиолетовая: Облако Сознания"},
      {color:"#ffffff",label:"Белая: Непостижимая Зона"},
      {color:"#d29922",label:"Золотая: Огненное Семя"}
    ],
    panelTitle:"ДОКУМЕНТАЦИЯ МУЛЬТИВСЕЛЕННОЙ:",
    readmeRu:"RU // Читать Манифест ↗",
    readmeEn:"EN // Open Declaration ↗"
  }
};
/* ---------- i18n apply function ---------- */
function applyLanguage(lang){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-key');
    if(!key)return;
    let text=langData[key];
    el.innerText=text.charAt(0).toUpperCase()+text.slice(1);
  });
}
/* ---------- Сменить язык кнопкой ---------- */
const langBtn=document.createElement('button');
langBtn.textContent='Переключить язык';
langBtn.style.position='fixed';langBtn.style.top='10px';langBtn.style.right='10px';langBtn.style.zIndex=1000;
langBtn.onclick=function(){
  const en=document.getElementById('README_en.html'),ru=document.getElementById('README_ru.html');
  if(en){en.textContent='RU // Open Declaration ↗';}if(ru){ru.textContent='EN // Read Manifest ↗';}
};
document.body.appendChild(langBtn);
</script>
<script src="index.js"></script>
</body>
</html>
